name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  automatic-gates:
    name: Automatic gates (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15
          - name: Windows
            os: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Frontend tests and code coverage
        run: npm run test:coverage

      - name: Engineering standards
        run: npm run verify:engineering

      - name: Manual acceptance path tests
        run: npm run test:manual-acceptance

      - name: No unfinished placeholders
        run: npm run verify:no-placeholders

      - name: Execution coverage
        run: npm run verify:execution-map

      - name: Rust format
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-release-evidence-${{ runner.os }}
          path: docs/release-evidence/
          if-no-files-found: ignore

  browser-layout:
    name: Browser layout smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run layout smoke tests
        run: npm run test:e2e
