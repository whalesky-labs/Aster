name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  automatic-gates:
    name: Automatic gates
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Engineering standards
        run: npm run verify:engineering

      - name: Manual acceptance path tests
        run: npm run test:manual-acceptance

      - name: No unfinished placeholders
        run: npm run verify:no-placeholders

      - name: Execution coverage
        run: npm run verify:coverage

      - name: Rust format
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-release-evidence-${{ runner.os }}
          path: docs/release-evidence/
          if-no-files-found: ignore
